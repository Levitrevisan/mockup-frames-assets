<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262933"/>
      <stop offset="1" stop-color="#16171b"/>
    </linearGradient>
    <clipPath id="screen">
      <rect x="169" y="118" width="174" height="276" rx="20"/>
    </clipPath>
  </defs>
  <!-- background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- phone body (golden bezel) -->
